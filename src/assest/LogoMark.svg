<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="petal-a" x1="32" y1="8" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7EC8D8"/>
      <stop offset="55%" stop-color="#0A7E94"/>
      <stop offset="100%" stop-color="#086B7E"/>
    </linearGradient>
